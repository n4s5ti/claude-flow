name: Intelligent Release Automation

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-alpha.*'
      - 'v*.*.*-beta.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.5.0-alpha.141)'
        required: true
        type: string
      tag:
        description: 'NPM tag (alpha, beta, latest)'
        required: true
        type: choice
        options:
          - alpha
          - beta
          - latest

env:
  NODE_VERSION: '20'

jobs:
  release-preparation:
    name: Prepare Release with Swarm Intelligence
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Extract Version Information
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"

            # Determine tag from version
            if [[ "$VERSION" == *"alpha"* ]]; then
              TAG="alpha"
            elif [[ "$VERSION" == *"beta"* ]]; then
              TAG="beta"
            else
              TAG="latest"
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "📦 Release Version: $VERSION (tag: $TAG)"

      - name: Initialize Release Swarm
        run: |
          echo "🤖 Initializing release automation swarm..."

          npx claude-flow@alpha mcp swarm_init \
            --topology hierarchical \
            --max-agents 6

          npx claude-flow@alpha mcp agent_spawn --type release-manager
          npx claude-flow@alpha mcp agent_spawn --type code-analyzer
          npx claude-flow@alpha mcp agent_spawn --type api-docs

      - name: Generate Changelog
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📝 Generating intelligent changelog..."

          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)

          echo "Analyzing changes from $PREV_TAG to HEAD..."

          # Generate changelog
          cat > RELEASE_NOTES.md << 'EOF'
          # Release v${{ steps.version.outputs.version }}

          ## What's Changed

          EOF

          # Get commits since last tag
          git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md

          echo "" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Contributors" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git log $PREV_TAG..HEAD --format="%aN" --no-merges | sort -u | sed 's/^/- @/' >> RELEASE_NOTES.md

          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "🤖 Generated by [Claude Flow Release Automation](https://github.com/ruvnet/claude-flow)" >> RELEASE_NOTES.md

          # Save for later use
          CHANGELOG=$(cat RELEASE_NOTES.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          cat RELEASE_NOTES.md

      - name: Analyze Release Impact
        run: |
          echo "📊 Analyzing release impact..."

          # Get changed files
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGED_FILES=$(git diff --name-only $PREV_TAG HEAD | wc -l)

          echo "Files changed: $CHANGED_FILES"

          # Categorize changes
          SRC_CHANGES=$(git diff --name-only $PREV_TAG HEAD | grep '^src/' | wc -l)
          TEST_CHANGES=$(git diff --name-only $PREV_TAG HEAD | grep -E 'test|spec' | wc -l)
          DOC_CHANGES=$(git diff --name-only $PREV_TAG HEAD | grep '\.md$' | wc -l)

          echo "Source changes: $SRC_CHANGES"
          echo "Test changes: $TEST_CHANGES"
          echo "Documentation changes: $DOC_CHANGES"

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build-and-test:
    name: Build and Test Release
    runs-on: ubuntu-latest
    needs: release-preparation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run comprehensive tests
        run: |
          echo "🧪 Running comprehensive test suite..."
          npm run test:ci

      - name: Build project
        run: |
          echo "🔨 Building release artifacts..."
          npm run build

      - name: Verify build
        run: |
          echo "✅ Verifying build artifacts..."

          # Check build outputs
          ls -la dist/ dist-cjs/

          # Test CLI
          chmod +x ./bin/claude-flow
          ./bin/claude-flow --version

      - name: Create package
        run: |
          echo "📦 Creating release package..."
          npm pack

          PKG_FILE=$(ls *.tgz)
          echo "Package created: $PKG_FILE"

          # Verify package contents
          tar -tzf $PKG_FILE | head -20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            dist/
            dist-cjs/
            *.tgz

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [release-preparation, build-and-test]
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-package

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Install dependencies
        run: npm ci

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "📤 Publishing to NPM with tag: ${{ needs.release-preparation.outputs.tag }}..."

          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --tag ${{ needs.release-preparation.outputs.tag }} --access public
            echo "✅ Published successfully!"
          else
            echo "⚠️ NPM_TOKEN not configured - skipping publish"
            echo "To enable automatic publishing, add NPM_TOKEN to repository secrets"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🎉 Creating GitHub release..."

          VERSION="v${{ needs.release-preparation.outputs.version }}"

          # Determine if pre-release
          if [[ "${{ needs.release-preparation.outputs.tag }}" == "alpha" ]] || \
             [[ "${{ needs.release-preparation.outputs.tag }}" == "beta" ]]; then
            PRERELEASE="--prerelease"
          else
            PRERELEASE=""
          fi

          # Create release
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE \
            *.tgz

      - name: Notify Success
        if: success()
        run: |
          echo "🎊 Release v${{ needs.release-preparation.outputs.version }} completed successfully!"
          echo ""
          echo "📦 NPM: https://www.npmjs.com/package/claude-flow/v/${{ needs.release-preparation.outputs.version }}"
          echo "🏷️ Tag: ${{ needs.release-preparation.outputs.tag }}"

  post-release:
    name: Post-Release Tasks
    runs-on: ubuntu-latest
    needs: [release-preparation, publish-release]
    if: always()

    steps:
      - name: Generate Release Report
        run: |
          echo "# 🤖 Release Automation Report"
          echo ""
          echo "## Release Information"
          echo "- **Version**: v${{ needs.release-preparation.outputs.version }}"
          echo "- **Tag**: ${{ needs.release-preparation.outputs.tag }}"
          echo "- **Status**: ${{ needs.publish-release.result }}"
          echo ""
          echo "## Swarm Configuration"
          echo "- **Topology**: Hierarchical"
          echo "- **Agents**: Release Manager, Code Analyzer, API Documentation"
          echo ""
          echo "---"
          echo "🤖 Generated by Claude Flow Release Automation"
